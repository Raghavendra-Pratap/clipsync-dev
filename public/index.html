<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <title>ClipSync — Local chat</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .status {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .status.connected { color: #34d399; }
    .status.disconnected { color: #f87171; }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
      text-align: right;
      max-width: min(100%, 22rem);
    }
    .share-urls {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-all;
    }
    .share-urls a {
      color: #93c5fd;
      text-decoration: none;
    }
    .share-urls a:hover { text-decoration: underline; }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .bubble {
      max-width: min(92vw, 36rem);
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
    }
    .bubble .meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }
    .bubble .name { font-weight: 600; color: var(--text); }
    .bubble .body {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      line-height: 1.45;
    }
    .bubble .segment-text {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      tab-size: 4;
      -moz-tab-size: 4;
    }
    .bubble .segment-code {
      margin: 0;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      background: #0c1018;
      border: 1px solid var(--border);
      overflow-x: auto;
      max-width: 100%;
    }
    .bubble .segment-code code {
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.86rem;
      line-height: 1.5;
      white-space: pre;
      display: block;
      color: #e2e8f0;
    }
    footer {
      padding: 0.75rem 1rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    footer textarea#input {
      flex: 1;
      min-width: 0;
      min-height: 3.25rem;
      max-height: 40vh;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
      line-height: 1.45;
      resize: vertical;
      tab-size: 4;
      -moz-tab-size: 4;
    }
    footer textarea#input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    footer button {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }
    footer button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .setup {
      padding: 0 1rem 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .setup label { margin-right: 0.35rem; }
  </style>
</head>
<body>
  <header>
    <h1>ClipSync</h1>
    <div class="header-right">
      <div id="shareUrls" class="share-urls" aria-live="polite">Loading…</div>
      <span id="status" class="status disconnected">Disconnected</span>
    </div>
  </header>
  <div class="setup">
    <label for="name">Display name</label>
    <input id="name" type="text" maxlength="32" placeholder="e.g. Phone" style="width:10rem;padding:0.35rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);" />
  </div>
  <div id="log" aria-live="polite"></div>
  <footer>
    <textarea id="input" autocomplete="off" rows="3" maxlength="100000" placeholder="Message or code — Enter newline · Ctrl+Enter / ⌘+Enter send · optional ``` fences for code"></textarea>
    <button id="send" type="button">Send</button>
  </footer>
  <script>
    const colors = ["#60a5fa", "#34d399", "#fbbf24", "#f472b6", "#a78bfa", "#fb923c", "#2dd4bf"];
    const nameKey = "clipsync_name";
    const colorKey = "clipsync_color";

    function pickColor() {
      let c = sessionStorage.getItem(colorKey);
      if (!c) {
        c = colors[Math.floor(Math.random() * colors.length)];
        sessionStorage.setItem(colorKey, c);
      }
      return c;
    }

    const nameEl = document.getElementById("name");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const logEl = document.getElementById("log");
    const statusEl = document.getElementById("status");
    const shareUrlsEl = document.getElementById("shareUrls");

    function isAppleLikePlatform() {
      const p = navigator.userAgentData?.platform;
      if (p === "macOS" || p === "iOS") return true;
      return /Mac|iPhone|iPad|iPod/.test(navigator.platform || "");
    }

    (async function loadLanInfo() {
      try {
        const r = await fetch("/api/lan-info");
        const j = await r.json();
        const port = String(j.port || location.port || (location.protocol === "https:" ? 443 : 80));
        const addrs = Array.isArray(j.addresses) ? j.addresses : [];
        shareUrlsEl.replaceChildren();
        if (!addrs.length) {
          shareUrlsEl.textContent = `${location.protocol}//${location.host}`;
          return;
        }
        shareUrlsEl.appendChild(document.createTextNode("Open / share: "));
        addrs.forEach((addr, i) => {
          const u = `${location.protocol}//${addr}:${port}`;
          const a = document.createElement("a");
          a.href = u;
          a.textContent = u;
          shareUrlsEl.appendChild(a);
          if (i < addrs.length - 1) shareUrlsEl.appendChild(document.createTextNode(" · "));
        });
      } catch {
        shareUrlsEl.textContent = `${location.protocol}//${location.host}`;
      }
    })();

    nameEl.value = localStorage.getItem(nameKey) || "";
    nameEl.addEventListener("change", () => {
      localStorage.setItem(nameKey, nameEl.value.trim());
    });

    function fmtTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
    }

    function parseMessageSegments(raw) {
      /** @type {{ type: "text" | "code"; body: string }[]} */
      const parts = [];
      let i = 0;
      let buf = "";
      let inCode = false;

      function pushText() {
        if (buf.length) parts.push({ type: "text", body: buf });
        buf = "";
      }
      function pushCode() {
        if (buf.length) parts.push({ type: "code", body: buf });
        buf = "";
      }

      while (i < raw.length) {
        if (raw.startsWith("```", i)) {
          i += 3;
          if (!inCode) {
            pushText();
            inCode = true;
            while (i < raw.length && raw[i] !== "\n" && raw[i] !== "\r") i++;
            if (i < raw.length) {
              if (raw[i] === "\r") i++;
              if (i < raw.length && raw[i] === "\n") i++;
            }
          } else {
            pushCode();
            inCode = false;
            if (i < raw.length && (raw[i] === "\n" || raw[i] === "\r")) {
              if (raw[i] === "\r" && raw[i + 1] === "\n") i += 2;
              else i += 1;
            }
          }
          continue;
        }
        buf += raw[i++];
      }
      if (inCode) pushCode();
      else pushText();

      return parts.length ? parts : [{ type: "text", body: raw }];
    }

    function appendMessage(m) {
      const div = document.createElement("div");
      div.className = "bubble";

      const meta = document.createElement("div");
      meta.className = "meta";
      const nameSpan = document.createElement("span");
      nameSpan.className = "name";
      nameSpan.textContent = m.name;
      nameSpan.style.color = m.color || "#8b9cb3";
      const timeSpan = document.createElement("span");
      timeSpan.className = "time";
      timeSpan.textContent = fmtTime(m.ts);
      meta.append(nameSpan, timeSpan);

      const bodyEl = document.createElement("div");
      bodyEl.className = "body";

      for (const seg of parseMessageSegments(m.text)) {
        if (seg.type === "code") {
          const pre = document.createElement("pre");
          pre.className = "segment-code";
          const code = document.createElement("code");
          code.textContent = seg.body;
          pre.appendChild(code);
          bodyEl.appendChild(pre);
        } else {
          const block = document.createElement("div");
          block.className = "segment-text";
          block.textContent = seg.body;
          bodyEl.appendChild(block);
        }
      }

      div.append(meta, bodyEl);
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${proto}//${location.host}`);

    ws.onopen = () => {
      statusEl.textContent = "Connected";
      statusEl.className = "status connected";
      sendBtn.disabled = false;
    };
    ws.onclose = () => {
      statusEl.textContent = "Disconnected — refresh page";
      statusEl.className = "status disconnected";
      sendBtn.disabled = true;
    };
    ws.onerror = () => {
      statusEl.textContent = "Connection error";
      statusEl.className = "status disconnected";
    };

    ws.onmessage = (ev) => {
      let data;
      try {
        data = JSON.parse(ev.data);
      } catch {
        return;
      }
      if (data.type === "history" && Array.isArray(data.messages)) {
        logEl.replaceChildren();
        for (const m of data.messages) appendMessage(m);
        return;
      }
      if (data.type === "message" && data.message) appendMessage(data.message);
    };

    function send() {
      const text = inputEl.value;
      if (!text.trim() || ws.readyState !== WebSocket.OPEN) return;
      const name = nameEl.value.trim() || "Anonymous";
      localStorage.setItem(nameKey, name);
      ws.send(JSON.stringify({ type: "chat", name, text, color: pickColor() }));
      inputEl.value = "";
      inputEl.focus();
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        send();
      }
    });

    function modDown(e) {
      return e.ctrlKey || e.metaKey;
    }

    function selectedTextInField(el) {
      if (!el || (el.tagName !== "INPUT" && el.tagName !== "TEXTAREA")) return "";
      if (typeof el.selectionStart !== "number" || typeof el.selectionEnd !== "number") return "";
      const a = el.selectionStart;
      const b = el.selectionEnd;
      if (a === b) return "";
      return el.value.slice(a, b);
    }

    document.addEventListener(
      "keydown",
      (e) => {
        if (!modDown(e)) return;
        const k = e.key.toLowerCase();
        if (k === "c") {
          let text = selectedTextInField(document.activeElement);
          if (!text) {
            const sel = window.getSelection();
            text = sel ? String(sel) : "";
          }
          if (!text) return;
          e.preventDefault();
          navigator.clipboard.writeText(text).catch(() => {});
          return;
        }
        if (k !== "v") return;

        const t = document.activeElement;
        const inField =
          t &&
          (t.tagName === "INPUT" || t.tagName === "TEXTAREA") &&
          !t.readOnly &&
          !t.disabled;
        const apple = isAppleLikePlatform();
        const nativePaste =
          (apple && e.metaKey && !e.ctrlKey) || (!apple && e.ctrlKey && !e.metaKey);
        if (nativePaste && inField) return;

        const target = inField ? t : inputEl;
        if (target.readOnly || target.disabled) return;

        e.preventDefault();
        navigator.clipboard.readText().then((clip) => {
          if (target.tagName !== "INPUT" && target.tagName !== "TEXTAREA") return;
          const v = target.value;
          const start = target.selectionStart ?? v.length;
          const end = target.selectionEnd ?? v.length;
          const max =
            typeof target.maxLength === "number" && target.maxLength > 0
              ? target.maxLength
              : Number.POSITIVE_INFINITY;
          let insert = clip;
          const room = max - (v.length - (end - start));
          if (insert.length > room) insert = insert.slice(0, Math.max(0, room));
          target.value = v.slice(0, start) + insert + v.slice(end);
          const pos = start + insert.length;
          target.setSelectionRange(pos, pos);
          target.focus();
        }).catch(() => {});
      },
      true
    );

    sendBtn.disabled = true;
    inputEl.focus();
  </script>
</body>
</html>
